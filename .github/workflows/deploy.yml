name: Deploy MediaOnDemand

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      catalog: ${{ steps.filter.outputs.catalog }}
      user: ${{ steps.filter.outputs.user }}
      upload: ${{ steps.filter.outputs.upload }}
      search: ${{ steps.filter.outputs.search }}
      streaming: ${{ steps.filter.outputs.streaming }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'services/nginx.conf'
            catalog:
              - 'services/catalog-service/**'
            user:
              - 'services/user-service/**'
            upload:
              - 'services/upload-service/**'
            search:
              - 'services/search-service/**'
            streaming:
              - 'services/streaming-service/**'

  build-and-push:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Nginx (Frontend)
      - name: Build and push Nginx
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/ryusid/mediaondemand/nginx:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }}
            VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID }}
            VITE_AWS_REGION=${{ secrets.VITE_AWS_REGION }}

      # Build and push Catalog Service
      - name: Build and push Catalog Service
        if: needs.changes.outputs.catalog == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/catalog-service
          push: true
          tags: ghcr.io/ryusid/mediaondemand/catalog-service:latest

      # Build and push User Service
      - name: Build and push User Service
        if: needs.changes.outputs.user == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          push: true
          tags: ghcr.io/ryusid/mediaondemand/user-service:latest

      # Build and push Upload Service
      - name: Build and push Upload Service
        if: needs.changes.outputs.upload == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/upload-service
          push: true
          tags: ghcr.io/ryusid/mediaondemand/upload-service:latest

      # Build and push Search Service
      - name: Build and push Search Service
        if: needs.changes.outputs.search == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/search-service
          push: true
          tags: ghcr.io/ryusid/mediaondemand/search-service:latest

      # Build and push Streaming Service
      - name: Build and push Streaming Service
        if: needs.changes.outputs.streaming == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/streaming-service
          push: true
          tags: ghcr.io/ryusid/mediaondemand/streaming-service:latest

  deploy:
    needs: [changes, build-and-push]
    if: |
      always() && 
      needs.build-and-push.result == 'success' &&
      (needs.changes.outputs.frontend == 'true' || 
       needs.changes.outputs.catalog == 'true' || 
       needs.changes.outputs.user == 'true' || 
       needs.changes.outputs.upload == 'true' || 
       needs.changes.outputs.search == 'true' || 
       needs.changes.outputs.streaming == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            cd ~/mediaondemand
            git pull
            cd services
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -af
