version: '3.8'

services:
  # --- User Service ---
  user-service:
    build: ./user-service
    container_name: mod-user-service
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVICE_NAME=user-service
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-eu-west-1}
        awslogs-group: /mediaondemand/user-service
        tag: "{{.Name}}"

  # --- Catalog Service ---
  catalog-service:
    image: ghcr.io/ryusid/mediaondemand/catalog-service:latest
    container_name: mod-catalog-service
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVICE_NAME=catalog-service
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}
      - S3_RAW_BUCKET=${S3_RAW_BUCKET}
      - S3_PROCESSED_BUCKET=${S3_PROCESSED_BUCKET}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
    depends_on:
      - user-service
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-eu-west-1}
        awslogs-group: /mediaondemand/catalog-service
        tag: "{{.Name}}"

  # --- Upload Service ---
  upload-service:
    build: ./upload-service
    container_name: mod-upload-service
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVICE_NAME=upload-service
      - S3_RAW_BUCKET=${S3_RAW_BUCKET}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-eu-west-1}
        awslogs-group: /mediaondemand/upload-service
        tag: "{{.Name}}"

  # --- Search Service ---
  search-service:
    build: ./search-service
    container_name: mod-search-service
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVICE_NAME=search-service
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-eu-west-1}
        awslogs-group: /mediaondemand/search-service
        tag: "{{.Name}}"

  # --- Streaming Service ---
  streaming-service:
    build: ./streaming-service
    container_name: mod-streaming-service
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVICE_NAME=streaming-service
      - S3_PROCESSED_BUCKET=${S3_PROCESSED_BUCKET}
      - CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-eu-west-1}
        awslogs-group: /mediaondemand/streaming-service
        tag: "{{.Name}}"

  # --- Frontend & Gateway (Nginx) ---
  nginx:
    image: ghcr.io/ryusid/mediaondemand/nginx:latest
    container_name: mod-gateway
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - catalog-service
      - upload-service
      - search-service
      - streaming-service
    restart: unless-stopped
