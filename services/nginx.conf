events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    upstream user_service {
        server user-service:3000;
    }
    upstream catalog_service {
        server catalog-service:3000;
    }
    upstream upload_service {
        server upload-service:3000;
    }
    upstream search_service {
        server search-service:3000;
    }
    upstream streaming_service {
        server streaming-service:3000;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Health check
        location /health {
            return 200 '{"status": "ok", "service": "mediaondemand-gateway"}';
            add_header Content-Type application/json;
        }

        # Frontend Static Files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # User Service
        location /api/users {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Catalog Service
        location /api/catalog {
            proxy_pass http://catalog_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Upload Service
        location /api/upload {
            proxy_pass http://upload_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 500M;
        }

        # Search Service
        location /api/search {
            proxy_pass http://search_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Streaming Service
        location /api/stream {
            proxy_pass http://streaming_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
